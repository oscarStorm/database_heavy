services:
  mysql:
    image: mysql:8.4
    container_name: database-heavy-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    ports:
      - "3307:3306"

    volumes:
      - database_heavy_mysql_data:/var/lib/mysql

volumes:
  database_heavy_mysql_data:
